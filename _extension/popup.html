<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyyg Scraper Orchestrator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            width: 320px;
            padding: 16px;
            background: #0f0f14;
            color: #e0e0e6;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a35;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s;
        }
        .status-dot.connected { background: #22c55e; }
        
        .section { margin-bottom: 12px; }
        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b6b80;
            margin-bottom: 4px;
        }
        .value {
            font-size: 12px;
            color: #c0c0cc;
            word-break: break-all;
        }
        
        .progress-container {
            margin-top: 16px;
            display: none;
            background: #1a1a24;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2a2a35;
        }
        .progress-container.active { display: block; }
        
        .progress-bar-bg {
            height: 6px;
            background: #2a2a35;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #a78bfa;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8b8b9a;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 16px;
            border: none;
            border-radius: 6px;
            background: #7c3aed;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #6d28d9; }
        .btn:disabled {
            background: #3a3a4a;
            color: #6b6b80;
            cursor: not-allowed;
        }
        
        .footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #2a2a35;
            font-size: 10px;
            color: #4a4a5a;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <h1>Piyyg Scraper (Proctor Mode)</h1>
    </div>

    <div class="section">
        <div class="label">Proctor Session</div>
        <div class="value" id="sessionStatus">Not detected (Login to MSR-Insight)</div>
    </div>

    <div class="section">
        <div class="label">System Status</div>
        <div class="value" id="systemStatus">Idle</div>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="label">Scraping Progress</div>
        <div class="value" id="currentStudent">Preparing...</div>
        
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        
        <div class="stats">
            <span id="progressText">0 / 0</span>
            <span id="resultStats">✓ 0 | ✗ 0</span>
        </div>
    </div>

    <button class="btn" id="startBtn" disabled>Start Batch Scrape</button>

    <div class="footer">MSR-Insight • Automated Orchestration</div>

    <script src="popup.js"></script>
</body>
</html>
